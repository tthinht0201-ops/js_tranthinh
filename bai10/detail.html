<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail</title>

    <link rel="stylesheet" href="asset/bootstrap/css/bootstrap.min.css">

    <style>
        .product-image {
            max-height: 500px;
            object-fit: contain;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container px-4 px-lg-5">

            <a class="navbar-brand" href="index.html">Phone Store</a>

            <form class="d-flex" onsubmit="event.preventDefault(); window.location.href='cart.html';">
                <button class="btn btn-outline-dark">
                    Cart
                    <span id="cart-count" class="badge bg-dark text-white ms-1 rounded-pill">0</span>
                </button>
            </form>

        </div>
    </nav>

    <!-- CONTENT -->
    <div class="container mt-5">
        <div class="row">

            <div class="col-lg-8">

                <h1 id="product-name">Loading...</h1>

                <img id="product-image" class="img-fluid rounded product-image mb-4">

                <h3>Thông số kỹ thuật</h3>

                <table class="table table-bordered">
                    <tbody>
                        <tr>
                            <th>Màn hình</th>
                            <td id="screen"></td>
                        </tr>
                        <tr>
                            <th>Chip</th>
                            <td id="chip"></td>
                        </tr>
                        <tr>
                            <th>RAM</th>
                            <td id="ram"></td>
                        </tr>
                        <tr>
                            <th>Bộ nhớ</th>
                            <td id="storage"></td>
                        </tr>

                        <tr>
                            <th>Camera</th>
                            <td id="camera"></td>
                        </tr>

                        <tr>
                            <th>Pin</th>
                            <td id="battery"></td>
                        </tr>

                        <tr>
                            <th>OS</th>
                            <td id="os"></td>
                        </tr>

                        <tr>
                            <th>Giá</th>
                            <td id="price"></td>
                        </tr>
                    </tbody>
                </table>

                <button class="btn btn-dark" id="addToCart">Add to cart</button>

            </div>

        </div>
    </div>

    <!-- ✅ IMPORT DATA JS (KHÔNG DÙNG FETCH) -->
    <script src="product.js"></script>

    <script>
        function getProductById() {

            const id = Number(new URLSearchParams(window.location.search).get("id"));

            const product = products.find(p => p.id === id);

            if (!product) {
                document.body.innerHTML = "<h2>Không tìm thấy sản phẩm</h2>";
                return;
            }

            // render UI
            document.getElementById("product-name").innerText = product.name;
            document.getElementById("product-image").src = product.img;

            document.getElementById("screen").innerText = product.screen || "-";
            document.getElementById("chip").innerText = product.chip || "-";
            document.getElementById("ram").innerText = product.ram || "-";
            document.getElementById("storage").innerText = product.storage || "-";
            document.getElementById("camera").innerText = product.camera || "-";
            document.getElementById("battery").innerText = product.battery || "-";
            document.getElementById("os").innerText = product.os || "-";

            document.getElementById("price").innerText =
                (product.price || 0).toLocaleString() + " VNĐ";

            // add to cart
            document.getElementById("addToCart").onclick = function () {

                let cart = JSON.parse(localStorage.getItem("cart")) || [];

                let exist = cart.find(i => i.name === product.name);

                if (exist) {
                    exist.quantity++;
                } else {
                    cart.push({
                        name: product.name,
                        price: product.price,
                        image: product.img,
                        quantity: 1
                    });
                }

                localStorage.setItem("cart", JSON.stringify(cart));

                updateCartCount();
                alert("Đã thêm vào giỏ hàng!");
            };
        }

        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let total = 0;

            cart.forEach(i => total += i.quantity);

            document.getElementById("cart-count").innerText = total;
        }

        // run
        getProductById();
        updateCartCount();
    </script>

    <script src="asset/bootstrap/js/bootstrap.min.js"></script>

</body>

</html>
