<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Phone Store</title>
    <link rel="stylesheet" href="asset/bootstrap/css/bootstrap.min.css">
    <style>
        body {
            background: #f5f5f5;
        }
        .navbar {
            background: #fff;
        }
        .cart-section {
            padding: 60px 0;
        }
        .cart-card {
            border: none;
            border-radius: 15px;
        }
        .product-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border-radius: 10px;
            background: #fff;
            padding: 10px;
        }
        .table td {
            vertical-align: middle;
        }
        .summary-box {
            background: #fff;
            border-radius: 15px;
            padding: 25px;
        }
        footer {
            background: #000;
            color: #fff;
            text-align: center;
            padding: 15px 0;
            margin-top: 50px;
        }
        .empty-cart {
            text-align: center;
            padding: 50px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container px-4 px-lg-5">
            <a class="navbar-brand" href="index.html">
                Phone Store
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">

                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">
                            About
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">
                            Contact
                        </a>
                    </li>
                </ul>
                <form class="d-flex" onsubmit="event.preventDefault();">
                    <button class="btn btn-outline-dark" type="submit">
                        Cart
                        <span id="cart-count" class="badge bg-dark text-white ms-1 rounded-pill">
                            0
                        </span>
                    </button>
                </form>
            </div>
        </div>
    </nav>
    <section class="cart-section">
        <div class="container">
            <h2 class="fw-bold mb-4">
                Shopping Cart
            </h2>
            <div class="row">
                <div class="col-lg-8 mb-4">
                    <div class="card cart-card shadow-sm">
                        <div class="card-body">
                            <div id="cart-container">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="summary-box shadow-sm">
                        <h4 class="fw-bold mb-4">
                            Cart Summary
                        </h4>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Subtotal</span>
                            <span id="subtotal">
                                0đ
                            </span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Shipping</span>
                            <span>
                                50.000đ
                            </span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4 fw-bold">
                            <span>Total</span>
                            <span id="total">
                                0đ
                            </span>
                        </div>
                        <button class="btn btn-primary w-100 mb-3">
                            Checkout
                        </button>
                        <a href="index.html" class="btn btn-outline-dark w-100">
                            Continue Shopping
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <footer>
        <p class="mb-0">
            © 2026 PhoneStore
        </p>
    </footer>
    <script>
        function renderCart() {
            let cart =
                JSON.parse(localStorage.getItem("cart")) || [];
            const cartContainer =
                document.getElementById("cart-container");
            const cartCount =
                document.getElementById("cart-count");
            let totalQuantity = 0;
            let subtotal = 0;
            if (cart.length === 0) {
                cartContainer.innerHTML = `
            <div class="empty-cart">
                <h4 class="mb-3">
                    Your cart is empty
                </h4>
                <a href="category.html"
                   class="btn btn-dark">
                    Go Shopping
                </a>
            </div>

        `;
                document.getElementById("subtotal")
                    .innerText = "0đ";
                document.getElementById("total")
                    .innerText = "0đ";
                cartCount.innerText = 0;
                return;
            }
            let html = `
        <table class="table align-middle">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
    `;
            cart.forEach((item, index) => {
                const itemTotal =
                    item.price * item.quantity;
                subtotal += itemTotal;
                totalQuantity += item.quantity;
                html += `
            <tr>
                <td>
                    <div class="d-flex align-items-center">
                        <img src="${item.image}"
                             class="product-img me-3">
                        <div>
                            <h6 class="mb-1">
                                ${item.name}
                            </h6>
                        </div>
                    </div>
                </td>
                <td>
                    ${item.price}đ
                </td>
                <td>
                    <input type="number"
                           class="form-control"
                           min="1"
                           value="${item.quantity}"
                           style="width:80px;"
                           onchange="updateQuantity(${index}, this.value)">

                </td>
                <td>
                    ${itemTotal}đ

                </td>
                <td>
                    <button class="btn btn-danger btn-sm"
                            onclick="removeItem(${index})">
                        Remove
                    </button>
                </td>
            </tr>

        `;
            });

            html += `
            </tbody>
        </table>
    `;
            cartContainer.innerHTML = html;
            document.getElementById("subtotal")
                .innerText = subtotal + "đ";
            document.getElementById("total")
                .innerText = (subtotal + 50000) + "đ" ;
            cartCount.innerText = totalQuantity;
        }
        function updateQuantity(index, quantity) {
            let cart =
                JSON.parse(localStorage.getItem("cart")) || [];
            cart[index].quantity =
                parseInt(quantity);
            localStorage.setItem(
                "cart",
                JSON.stringify(cart)
            );
            renderCart();
        }
        function removeItem(index) {
            let cart =
                JSON.parse(localStorage.getItem("cart")) || [];
            cart.splice(index, 1);
            localStorage.setItem(
                "cart",
                JSON.stringify(cart)
            );
            renderCart();
        }
        renderCart();
    </script>
    <script src="asset/bootstrap/js/bootstrap.min.js"></script>
</body>

</html>
