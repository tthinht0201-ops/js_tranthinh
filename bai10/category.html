<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Phone Store</title>
    <link rel="stylesheet" href="asset/bootstrap/css/bootstrap.min.css">
    <style>
        .hero-header {
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
                url('img/bgphone.jpg');

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            min-height: 50vh;
            display: flex;
            align-items: center;
        }

        .hero-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            color: white;
        }

        .card-img-top {
            height: 250px;
            object-fit: contain;
            padding: 20px;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container px-4 px-lg-5">
            <a class="navbar-brand" href="index.html">
                Phone Store
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>

                <form class="d-flex" onsubmit="event.preventDefault();
                  window.location.href='cart.html';">
                    <button class="btn btn-outline-dark" type="submit">
                        Cart
                        <span id="cart-count" class="badge bg-dark text-white ms-1 rounded-pill">
                            0
                        </span>
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <header class="hero-header py-5">
        <div class="container px-lg-5">
            <div class="hero-box p-4 p-lg-5 text-center">
                <h1 class="display-5 fw-bold">Iphone 15 Pro Max</h1>
                <p class="fs-4">
                    Siêu phẩm flagship với thiết kế sang trọng,
                    camera AI và hiệu năng mạnh mẽ.
                </p>
                <a class="btn btn-primary btn-lg" href="detail.html">
                    Check detail
                </a>
            </div>
        </div>
    </header>

    <!-- SORT -->
    <div class="container mt-4">
        <div class="d-flex justify-content-end">
            <select id="sortPrice" class="form-select" style="width:200px;">
                <option value="default">Price</option>
                <option value="asc">Price: Low → High</option>
                <option value="desc">Price: High → Low</option>
            </select>
        </div>
    </div>

    <!-- PRODUCT -->
    <section class="py-5">
        <div class="container px-4 px-lg-5 mt-5">
            <div class="row gx-4 gx-lg-5 row-cols-2 row-cols-md-3 row-cols-xl-4 justify-content-center">

                <!-- ITEM 1 -->
                <div class="col mb-5 product-item" data-price="29990000">
                    <div class="card h-100">
                        <img class="card-img-top" src="img/iphone-15.png">

                        <div class="card-body p-4 text-center">
                            <h5 class="fw-bolder">Iphone 15</h5>
                            29.990.000đ
                        </div>

                        <div class="card-footer bg-transparent border-top-0 text-center">
                            <!-- FIX DETAIL -->
                            <a class="btn btn-primary mb-2" href="detail.html?id=1">
                                Detail
                            </a>

                            <button class="btn btn-dark add-to-cart"
                                data-name="Iphone 15"
                                data-price="29990000"
                                data-image="img/iphone-15.png">
                                Add To Cart
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ITEM 2 -->
                <div class="col mb-5 product-item" data-price="26990000">
                    <div class="card h-100">
                        <img class="card-img-top" src="img/xiaomi.png">

                        <div class="card-body p-4 text-center">
                            <h5 class="fw-bolder">Xiaomi</h5>
                            26.990.000đ
                        </div>

                        <div class="card-footer bg-transparent border-top-0 text-center">
                            <!-- FIX DETAIL -->
                            <a class="btn btn-primary mb-2" href="detail.html?id=2">
                                Detail
                            </a>

                            <button class="btn btn-dark add-to-cart"
                                data-name="Xiaomi"
                                data-price="26990000"
                                data-image="img/xiaomi.png">
                                Add To Cart
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ITEM 3 -->
                <div class="col mb-5 product-item" data-price="21990000">
                    <div class="card h-100">
                        <img class="card-img-top" src="img/samsung-s24.png">

                        <div class="card-body p-4 text-center">
                            <h5 class="fw-bolder">Samsung S24</h5>
                            21.990.000đ
                        </div>

                        <div class="card-footer bg-transparent border-top-0 text-center">
                            <!-- FIX DETAIL -->
                            <a class="btn btn-primary mb-2" href="detail.html?id=3">
                                Detail
                            </a>

                            <button class="btn btn-dark add-to-cart"
                                data-name="Samsung S24"
                                data-price="21990000"
                                data-image="img/samsung-s24.png">
                                Add To Cart
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ITEM 4 -->
                <div class="col mb-5 product-item" data-price="21990000">
                    <div class="card h-100">
                        <img class="card-img-top" src="img/iphone17.jpg">

                        <div class="card-body p-4 text-center">
                            <h5 class="fw-bolder">Iphone 17</h5>
                            21.990.000đ
                        </div>

                        <div class="card-footer bg-transparent border-top-0 text-center">
                            <!-- FIX DETAIL -->
                            <a class="btn btn-primary mb-2" href="detail.html?id=4">
                                Detail
                            </a>

                            <button class="btn btn-dark add-to-cart"
                                data-name="Iphone 17"
                                data-price="21990000"
                                data-image="img/iphone17.jpg">
                                Add To Cart
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script src="asset/bootstrap/js/bootstrap.min.js"></script>
</body>

</html>
