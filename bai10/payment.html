<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="asset/bootstrap/css/bootstrap.min.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container px-4 px-lg-5">
            <a class="navbar-brand" href="index.html">Phone Store</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            Shop
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li>
                                <a class="dropdown-item" href="category.html">All Products</a>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <a class="dropdown-item" href="category.html">Popular Items</a>
                            </li>
                            <li>
                                <a class="dropdown-item" href="category.html">New Arrivals</a>
                            </li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>
                <form class="d-flex" onsubmit="event.preventDefault(); window.location.href='cart.html';">
                    <button class="btn btn-outline-dark" type="submit">
                        <i class="bi-cart-fill me-1"></i>
                        Cart
                        <span class="badge bg-dark text-white ms-1 rounded-pill">
                            0
                        </span>
                    </button>
                </form>
                </form>
            </div>
        </div>
    </nav>
    <div class="row mt-5" id="contact">
        <div class="col-lg-8 mx-auto">
            <div class="card contact-card p-5">
                <h3 class="text-center mb-4">
                    Information
                </h3>
                <form>
                    <div class="mb-3">
                        <input type="text" id="fullname" class="form-control" placeholder="Họ và tên">
                    </div>
                    <div class="mb-3">
                        <input type="email" id="email" class="form-control" placeholder="Email">
                    </div>
                    <div class="mb-3">
                        <input type="text" id="address" class="form-control" placeholder="Địa chỉ">
                    </div>
                    <div class="mb-3">
                        <input type="text" id="phone" class="form-control" placeholder="Số điện thoại">
                    </div>
                    <div class="mb-3">
                        <!--  <textarea rows="5" -->
                       <input type="text" id="note" class="form-control" placeholder="Ghi chú"><!-- </textarea> -->
                    </div>
                    <div class="text-center">
                        <button type="button" class="btn btn-primary" onclick="checkout()">
                            Thanh toán
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    </div>
    </section>
    <script>
        function checkout() {
            const data = {
                fullname: document.getElementById("fullname").value,
                email: document.getElementById("email").value,
                address: document.getElementById("address").value,
                phone: document.getElementById("phone").value,
                note: document.getElementById("note").value
            };
            localStorage.setItem("paymentInfo", JSON.stringify(data));
            window.location.href = "payment-success.html";
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
