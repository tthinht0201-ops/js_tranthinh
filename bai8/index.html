<html>
<head>
    <title>JS</title>
</head>
<body>
    <table border="1" width="400">
        <thead>
            <tr>
                <th>Tên</th>
                <th>Giá</th>
                <th>Số lượng</th>
            </tr>
        </thead>
        <tbody id="cart-table"></tbody>
    </table>

    <button onclick="clearAll()">Xóa hết giỏ hàng</button>

    <script>
        // Tạo dữ liệu giỏ hàng
        var cart = [
            { name: "Laptop", price: 1500, qty: 1 },
            { name: "Mouse", price: 25, qty: 2 },
            { name: "Keyboard", price: 70, qty: 1 }
        ]; 

        // // Lưu vào localStorage
        localStorage.setItem("cart", JSON.stringify(cart));

        // Lấy dữ liệu ra
        var cartData = JSON.parse(localStorage.getItem("cart")) || [];

        console.log(localStorage.getItem("cart"))

        // Hiển thị trên table
        var tableBody = document.getElementById("cart-table");
        let html = "";
    
        cartData.forEach(item => {
            html += `<tr>
            <td>${item.name}</td>
            <td>${item.price}</td>
            <td>${item.qty}</td>
            </tr> `;
        }); 
        tableBody.innerHTML = html;

        function clearAll() {
            localStorage.clear();
        }




    </script> 

</body>
</html>
